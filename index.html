<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Portal Login</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

    <!-- LEFT LOGIN SECTION -->
    <div class="left-section">
        <div class="login-box">
            <h1>Indian Institute Of Technology Patna</h1>
            <h2>Login</h2>
            <p class="subtitle">Enter your account details</p>

            <form>
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" placeholder="Enter username">
                </div>

                <div class="input-group password-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Enter password">
                        <span class="toggle" onclick="togglePassword()">👁</span>
                    </div>
                </div>

                <div class="forgot">
                    <a href="#">Forgot Password?</a>
                </div>

                <a href="Dashbord.html">
                <button type="button" class="login-btn">Login</button>
            </a>
            </form>

            <div class="signup">
                <span>Don't have an account?</span>
                <button class="signup-btn">Sign up</button>
            </div>
        </div>
    </div>

    <!-- RIGHT WELCOME SECTION -->
    <div class="right-section">
        <div class="glass-box">
            <h1>Welcome to Student Portal of IIT PATNA</h1>
            <p>Login to access your account</p>
            <img src="authentication.png" class="authentication">
        </div>
    </div>

</div>

<script>
function togglePassword() {
    const password = document.getElementById("password");
    if (password.type === "password") {
        password.type = "text";
    } else {
        password.type = "password";
    }
}
</script>

</body>
</html>
